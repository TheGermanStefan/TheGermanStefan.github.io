<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Academy Home · TheGermanStefan Academy</title>
<meta name="robots" content="noindex">
<style>
/*
 * academy-home.html — Academy Home: The Premium Living Academy
 * TheGermanStefan Academy · Sprint-003D (Premium Experience Edition)
 *
 * Sprint-003B-1 Components (FROZEN):
 *   1. Welcome Header    2. German Buddy Card   3. Today's Focus
 *   4. Continue Journey  5. Progress Summary    6. Navigation
 *
 * Sprint-003B-2 Components (FROZEN):
 *   6. German Passport Preview  7. Journey Preview  8. Buddy Practice
 *   +  Academy Identity Card
 *
 * Sprint-003C — Journey Intelligence Engine (this sprint):
 *   🧠 Remember  🧭 Guide  ❤️ Motivate  🏆 Celebrate
 *   - buildJourneyIntelligence() replaces getLivingGreeting + selectBuddyMessage + selectTodaysFocus
 *   - MESSAGES library: all JI-aware strings with Felix / Sophia variants
 *   - Buddy name: "Felix" / "Sophia" (from tgs_profile_v1.buddyId)
 *   - Journey Preview: level progress bar + days at level added to Today stop
 *   - Passport Preview: milestone anticipation line when 1 day from streak milestone
 *   - Buddy Practice: context-aware reason on returning-after-gap recommendation
 *   - tgs_home_v1: lastVisit, lastLevel, levelStartDate fields added
 *
 * Sprint-003C Design Principle:
 *   "The Academy should never simply display information.
 *    It should transform information into confidence."
 *
 * Reserved (future sprints):
 *   Daily Challenge, Your German Journey, Buddy Avatar illustrations,
 *   First Welcome Experience (Buddy Selection), Academy Passport Number
 *
 * Data sources: tgs-progress.js · tgs-profile.js · tgs-content-registry.js
 *               tgs-achievements.js · tgs_home_v1 (home state key)
 */

/* ── RESET & DESIGN TOKENS ──────────────────────────────────────── */
*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  /* Brand tokens — match level-dashboard.html exactly */
  --navy:      #0b2545;
  --navy2:     #0d2e56;
  --blue:      #1464b4;
  --amber:     #f9a825;
  --green:     #2e7d32;
  --red:       #c62828;
  --gray:      #f0f4f8;
  --border:    #e0e6f0;

  /* Card tokens — upgraded for premium material feel */
  --card-bg:   rgba(255,255,255,.06);
  --card-bd:   rgba(255,255,255,.14);
  --txt-dim:   rgba(255,255,255,.55);
  --txt-faint: rgba(255,255,255,.3);

  /* Level colour — set by JS after TGS_PROFILE.getCurrentLevel() */
  --level-color: #1464b4;

  /* Home layout */
  --home-max:  680px;
  --home-pad:  16px;
  --gap:       14px;
  --radius:    16px;
  --radius-sm: 10px;

  /* Bottom nav height (mobile) */
  --nav-h: 64px;
}

html { scroll-behavior: smooth; }

body {
  font-family: 'Segoe UI', Arial, sans-serif;
  background: var(--navy);
  color: #fff;
  min-height: 100vh;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

/* ── ATMOSPHERIC BACKGROUND LAYER ───────────────────────────────── */
/*
 * Fixed decorative layer — aria-hidden, pointer-events none.
 * Creates cinematic depth behind all content without affecting layout.
 * Two radial gradients: a cool blue glow upper-left, a deep blue
 * lower-right. Together they give the impression of light falling
 * into a large, calm room.
 */
.home-bg-layer {
  position: fixed;
  inset: 0;
  z-index: -1;
  pointer-events: none;
  background:
    radial-gradient(ellipse 75% 55% at 18% 0%,   rgba(20,100,180,.17) 0%, transparent 100%),
    radial-gradient(ellipse 55% 40% at 84% 100%,  rgba(15,50,110,.14)  0%, transparent 100%);
}

/* ── TOPBAR ─────────────────────────────────────────────────────── */
.topbar {
  background: rgba(0,0,0,.35);
  padding: 10px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  border-bottom: 1px solid rgba(255,255,255,.08);
  position: sticky;
  top: 0;
  z-index: 200;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
}
.tgs-logo {
  font-size: 15px;
  font-weight: 900;
  color: #fff;
  text-decoration: none;
  white-space: nowrap;
  flex-shrink: 0;
}
.tgs-logo span { color: var(--amber); }

/* Desktop nav links inside topbar — hidden on mobile */
.topbar-nav {
  display: none;
  align-items: center;
  gap: 4px;
}
@media (min-width: 700px) {
  .topbar-nav { display: flex; }
}
.tnav-item {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 12px;
  font-weight: 700;
  color: var(--txt-dim);
  text-decoration: none;
  padding: 6px 10px;
  border-radius: 8px;
  transition: color .15s, background .15s;
  white-space: nowrap;
}
.tnav-item:hover { color: #fff; background: rgba(255,255,255,.08); }
.tnav-item.active { color: var(--amber); }
.tnav-item.coming { opacity: .4; cursor: default; pointer-events: none; }

.topbar-right {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}
.btn-skool {
  background: var(--amber);
  color: var(--navy);
  font-size: 11px;
  font-weight: 900;
  padding: 6px 14px;
  border-radius: 7px;
  text-decoration: none;
  transition: filter .15s;
  white-space: nowrap;
}
.btn-skool:hover { filter: brightness(1.1); }

/* ── HOME LAYOUT ────────────────────────────────────────────────── */
.home-wrap {
  max-width: var(--home-max);
  margin: 0 auto;
  padding: 20px var(--home-pad) calc(var(--nav-h) + 24px);
  display: flex;
  flex-direction: column;
  gap: var(--gap);
}

/* Desktop: slightly wider, no bottom nav padding needed */
@media (min-width: 700px) {
  .home-wrap {
    max-width: 860px;
    padding-bottom: 48px;
  }
}

/* ── BASE COMPONENT CARD — PREMIUM MATERIAL ─────────────────────── */
/*
 * Design upgrade: richer surface — box-shadow creates depth below
 * the card; inset 1px top highlight mimics a surface catching light.
 * Padding increased 20px → 24px. Border opacity 0.10 → 0.14.
 */
.component {
  background: var(--card-bg);
  border: 1px solid var(--card-bd);
  border-radius: var(--radius);
  padding: 24px;
  box-shadow:
    0 2px 16px rgba(0,0,0,.28),
    inset 0 1px 0 rgba(255,255,255,.10);
  transition: opacity .3s ease;
}
.comp-label {
  font-size: 11px;
  font-weight: 800;
  letter-spacing: .5px;
  text-transform: uppercase;
  color: var(--txt-faint);
  margin-bottom: 12px;
}

/* ══════════════════════════════════════════════════════════════════
   COMPONENT 1: WELCOME HEADER — HERO TREATMENT
   Design upgrade: no left-border card pattern (that is a dashboard
   convention). The hero breathes more, has atmospheric depth, and
   the greeting + name command the top of the page.
   Living Academy ready — time-of-day greeting active (Sprint-003B-1)
   Full Living Academy (birthday, cultural calendar) → Sprint-003B-3
══════════════════════════════════════════════════════════════════ */
.welcome-section {
  background: linear-gradient(160deg,
    rgba(255,255,255,.08) 0%,
    rgba(255,255,255,.03) 65%,
    rgba(249,168,37,.04)  100%
  );
  border: 1px solid rgba(255,255,255,.12);
  /* No border-left accent — this is a hero, not a dashboard panel */
  border-radius: var(--radius);
  padding: 42px 24px 30px;
  box-shadow:
    0 4px 28px rgba(0,0,0,.28),
    inset 0 1px 0 rgba(255,255,255,.13);
}

/* Greeting line — time-of-day German greeting */
.welcome-greeting {
  font-size: 14px;
  font-weight: 600;
  letter-spacing: .3px;
  color: rgba(255,255,255,.48);
  margin-bottom: 4px;
}

/* Sprint-003C: JI-selected motivational subtitle beneath German greeting */
.welcome-subtitle {
  font-size: 12px;
  color: rgba(255,255,255,.35);
  line-height: 1.45;
  margin-bottom: 10px;
  font-style: italic;
}

/* Student name + level row */
.welcome-name-row {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 18px;
}
/* Design upgrade: 22px → 28px — confident, headline scale */
.welcome-name {
  font-size: 28px;
  font-weight: 900;
  line-height: 1.15;
}
.welcome-level-chip {
  background: var(--level-color);
  color: #fff;
  font-size: 11px;
  font-weight: 900;
  padding: 4px 12px;
  border-radius: 99px;
  letter-spacing: .4px;
  text-transform: uppercase;
  flex-shrink: 0;
  box-shadow: 0 2px 8px rgba(0,0,0,.25);
}

/* Stats row: streak + XP */
.welcome-stats {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
/*
 * Design upgrade: gold is now reserved for the CTA button and active
 * nav only. Stat chips use clean white/opacity treatment — they read
 * as neutral data, not competing calls to action.
 */
.stat-chip {
  display: flex;
  align-items: center;
  gap: 6px;
  background: rgba(255,255,255,.08);
  border: 1px solid rgba(255,255,255,.12);
  border-radius: 99px;
  padding: 6px 14px;
  font-size: 13px;
  font-weight: 700;
}
.stat-chip .stat-icon { font-size: 13px; opacity: .65; }
.stat-chip .stat-val  { color: #fff; }
.stat-chip .stat-lbl  { color: rgba(255,255,255,.42); font-weight: 600; }

/* Sprint-003B-3: Your Card tap target (Identity Card stub) */
.identity-card-stub {
  margin-top: 14px;
  display: inline-block;
  font-size: 11px;
  font-weight: 700;
  color: var(--txt-faint);
  cursor: default;
  /* Sprint-003B-2: this becomes a tappable expand → Academy Identity Card */
}

/* ══════════════════════════════════════════════════════════════════
   COMPONENT 2: GERMAN BUDDY CARD — COMPANION PRESENCE
   Design upgrade: avatar 40px → 76px with amber gradient ring.
   Buddy reads as a real companion, not a system notification.
   Message text is larger and breathes more. Name is title-case,
   not an all-caps system label.
   Template-based (Sprint-003B-1)
   Last Visit Memory → Sprint-003B-3
   AI-driven → Future Buddy Sprint
══════════════════════════════════════════════════════════════════ */
.buddy-card {
  display: flex;
  gap: 18px;
  align-items: flex-start;
}
/*
 * Design upgrade: 40px → 76px. Gradient ring (level-color → amber)
 * signals that the Buddy is part of the same Academy identity system.
 * Drop shadow gives the avatar physical presence on the card.
 */
.buddy-avatar {
  width: 76px;
  height: 76px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--level-color) 0%, var(--amber) 100%);
  box-shadow:
    0 4px 20px rgba(0,0,0,.40),
    0 0 0 3px rgba(249,168,37,.22);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 36px;
  flex-shrink: 0;
}
.buddy-body { flex: 1; min-width: 0; }
/*
 * Design upgrade: sentence-case name with amber tint — reads as a
 * person's name/title, not a system component label.
 */
.buddy-name {
  font-size: 12px;
  font-weight: 700;
  color: rgba(249,168,37,.65);
  margin-bottom: 8px;
  letter-spacing: .1px;
  /* No text-transform: uppercase — this is a companion, not a label */
}
/* Design upgrade: 14px → 15px, more breathing room between lines */
.buddy-message {
  font-size: 15px;
  line-height: 1.7;
  color: rgba(255,255,255,.9);
}
/* Sprint-003B (future): Ask Buddy link */
.buddy-ask-link {
  display: inline-block;
  margin-top: 12px;
  font-size: 12px;
  font-weight: 700;
  color: var(--txt-faint);
  text-decoration: none;
  cursor: default;
  /* Activates when Buddy conversation page is built */
}

/* ══════════════════════════════════════════════════════════════════
   COMPONENT 3: TODAY'S FOCUS
   Rule-based (Sprint-003B-1)
   Renamed from "Today's Mission" — see Blueprint v2.0 §25
══════════════════════════════════════════════════════════════════ */
.focus-card {
  display: flex;
  align-items: center;
  gap: 16px;
  background: rgba(255,255,255,.04);
  border: 1px solid rgba(255,255,255,.10);
  border-radius: var(--radius-sm);
  padding: 16px 18px;
  box-shadow: inset 0 1px 0 rgba(255,255,255,.07);
}
.focus-icon {
  font-size: 24px;
  flex-shrink: 0;
}
.focus-body { flex: 1; min-width: 0; }
.focus-label {
  font-size: 10px;
  font-weight: 800;
  letter-spacing: .5px;
  text-transform: uppercase;
  color: var(--txt-faint);
  margin-bottom: 4px;
}
.focus-text {
  font-size: 14px;
  font-weight: 700;
  line-height: 1.45;
  color: rgba(255,255,255,.9);
}

/* ══════════════════════════════════════════════════════════════════
   COMPONENT 4: CONTINUE JOURNEY  (PRIMARY CTA — THE CENTREPIECE)
   Design upgrade: the card now glows outward (ambient box-shadow).
   The ::before pseudo-element becomes a soft corner radial glow
   rather than a solid accent bar — more cinematic, less dashboard.
   Button gains gold box-shadow to feel luminous.
   SACRED RULE: Always visible above the fold on mobile.
   Nothing competes with this element visually.
══════════════════════════════════════════════════════════════════ */
.cta-card {
  background: linear-gradient(150deg,
    rgba(255,255,255,.10) 0%,
    rgba(255,255,255,.05) 100%
  );
  border: 1px solid rgba(255,255,255,.18);
  border-radius: var(--radius);
  padding: 26px 22px;
  position: relative;
  overflow: hidden;
  /*
   * The card emanates light — ambient blue glow behind it (not a
   * drop shadow), plus depth shadow and inset highlight.
   */
  box-shadow:
    0 0 60px rgba(20,100,180,.20),
    0 4px 28px rgba(0,0,0,.38),
    inset 0 1px 0 rgba(255,255,255,.15);
}
/*
 * Design upgrade: ::before is now an atmospheric corner glow,
 * not a solid accent bar. Creates a sense of depth within the card.
 */
.cta-card::before {
  content: '';
  position: absolute;
  top: -70px; right: -70px;
  width: 200px;
  height: 200px;
  background: radial-gradient(circle, rgba(20,100,180,.18) 0%, transparent 70%);
  pointer-events: none;
}

.cta-module-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 10px;
}
.cta-module-badge {
  font-size: 10px;
  font-weight: 900;
  letter-spacing: .5px;
  text-transform: uppercase;
  background: var(--level-color);
  color: #fff;
  padding: 3px 10px;
  border-radius: 99px;
  box-shadow: 0 1px 6px rgba(0,0,0,.25);
}
.cta-module-label {
  font-size: 12px;
  color: var(--txt-dim);
  font-weight: 600;
}
/* Design upgrade: lesson title 20px → 23px — it earns headline scale */
.cta-lesson-title {
  font-size: 23px;
  font-weight: 900;
  line-height: 1.25;
  margin-bottom: 6px;
}
.cta-meta-row {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 20px;
}
.cta-meta-item {
  font-size: 12px;
  color: var(--txt-dim);
  display: flex;
  align-items: center;
  gap: 4px;
}
/*
 * Design upgrade: button padding 14px → 16px (larger touch target,
 * more weight). Gold box-shadow makes the button appear to glow —
 * reinforcing it as the single most important action on the page.
 */
.btn-continue {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  width: 100%;
  background: var(--amber);
  color: var(--navy);
  font-size: 15px;
  font-weight: 900;
  padding: 16px 24px;
  border-radius: var(--radius-sm);
  text-decoration: none;
  border: none;
  cursor: pointer;
  font-family: inherit;
  box-shadow: 0 4px 18px rgba(249,168,37,.28);
  transition: filter .15s, transform .1s, box-shadow .15s;
  -webkit-tap-highlight-color: transparent;
}
.btn-continue:hover {
  filter: brightness(1.08);
  box-shadow: 0 6px 28px rgba(249,168,37,.40);
}
.btn-continue:active { transform: scale(.98); }

/* First-time CTA variant */
.btn-continue.btn-begin {
  background: linear-gradient(135deg, var(--level-color), color-mix(in srgb, var(--level-color) 70%, #fff));
  color: #fff;
  box-shadow: 0 4px 18px rgba(20,100,180,.30);
}

/* Level complete CTA variant */
.cta-complete-note {
  font-size: 13px;
  color: var(--amber);
  font-weight: 700;
  margin-bottom: 8px;
}

/* ══════════════════════════════════════════════════════════════════
   COMPONENT 5: PROGRESS SUMMARY — ACHIEVEMENT WALL
   Design upgrade: numbers 20px → 30px (proud, scoreboard scale).
   Progress bar 6px → 9px with subtle shimmer animation.
   Motion-safe: shimmer gated behind prefers-reduced-motion check.
══════════════════════════════════════════════════════════════════ */
.progress-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 1px;
  background: rgba(255,255,255,.07);
  border-radius: var(--radius-sm);
  overflow: hidden;
  margin-bottom: 18px;
}
/* Design upgrade: more vertical padding so large numbers breathe */
.prog-stat {
  background: var(--navy2);
  padding: 16px 10px;
  text-align: center;
}
/* Design upgrade: 20px → 30px — numbers should feel proud */
.prog-stat-val {
  font-size: 30px;
  font-weight: 900;
  line-height: 1;
  margin-bottom: 5px;
}
.prog-stat-lbl {
  font-size: 10px;
  font-weight: 700;
  color: rgba(255,255,255,.38);
  text-transform: uppercase;
  letter-spacing: .5px;
}

/* Level progress bar */
.level-prog-label {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 7px;
}
.level-prog-name {
  font-size: 13px;
  font-weight: 700;
  color: rgba(255,255,255,.8);
}
.level-prog-pct {
  font-size: 12px;
  font-weight: 700;
  color: var(--level-color);
}
/* Design upgrade: 6px → 9px — a more substantial track */
.pbar-wrap {
  background: rgba(255,255,255,.10);
  border-radius: 99px;
  height: 9px;
  overflow: hidden;
}
/*
 * Design upgrade: bar carries a moving highlight (shimmer) using
 * background-position animation — no transform, no layout impact.
 * Gated behind prefers-reduced-motion for accessibility.
 */
.pbar-fill {
  height: 100%;
  background: linear-gradient(90deg,
    var(--level-color)           0%,
    rgba(255,255,255,.30)        50%,
    var(--level-color)           100%
  );
  background-size: 200% 100%;
  border-radius: 99px;
  transition: width .7s ease;
  min-width: 2px;
  animation: bar-shimmer 2.8s ease-in-out 1.2s infinite;
}
@keyframes bar-shimmer {
  0%   { background-position:  100% 0; }
  60%  { background-position: -100% 0; }
  100% { background-position: -100% 0; }
}
/* Accessibility: disable animation for users who prefer reduced motion */
@media (prefers-reduced-motion: reduce) {
  .pbar-fill {
    animation: none;
    background: var(--level-color);
  }
}
.level-prog-sub {
  margin-top: 7px;
  font-size: 11px;
  color: var(--txt-faint);
}

/* ══════════════════════════════════════════════════════════════════
   SKELETON LOADING STATES
   Sections get .is-loading until JS renders them.
   Since data is from localStorage, duration is <50ms typically.
══════════════════════════════════════════════════════════════════ */
.is-loading {
  pointer-events: none;
}
.is-loading .skel {
  background: rgba(255,255,255,.06);
  border-radius: 6px;
  animation: skel-pulse 1.2s ease-in-out infinite;
}
.skel-h1  { height: 28px; width: 60%; margin-bottom: 12px; }
.skel-h2  { height: 18px; width: 80%; margin-bottom: 8px; }
.skel-h3  { height: 14px; width: 90%; margin-bottom: 6px; }
.skel-btn { height: 52px; width: 100%; margin-top: 14px; }
@keyframes skel-pulse {
  0%,100% { opacity: .5; }
  50%      { opacity: 1; }
}

/* Fade-in animation for rendered content */
.fade-in {
  animation: fadeUp .3s ease both;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* Stagger delays for sequential reveal */
.stagger-1 { animation-delay: 0ms;   }
.stagger-2 { animation-delay: 50ms;  }
.stagger-3 { animation-delay: 100ms; }
.stagger-4 { animation-delay: 150ms; }
.stagger-5 { animation-delay: 200ms; }
/* Sprint-003B-2 additions */
.stagger-6 { animation-delay: 250ms; }
.stagger-7 { animation-delay: 300ms; }
.stagger-8 { animation-delay: 350ms; }

/* ══════════════════════════════════════════════════════════════════
   IDENTITY CARD — Collapsible from Welcome Header
   Sprint-003B-2
   Replaces the Sprint-003B-1 .identity-card-stub placeholder.
══════════════════════════════════════════════════════════════════ */

/* Toggle button — replaces the static stub */
.identity-card-trigger {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  margin-top: 16px;
  background: none;
  border: none;
  color: rgba(255,255,255,.38);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .3px;
  cursor: pointer;
  font-family: inherit;
  padding: 0;
  -webkit-tap-highlight-color: transparent;
  transition: color .15s;
}
.identity-card-trigger:hover { color: rgba(255,255,255,.65); }
.identity-card-trigger.open  { color: var(--amber); }

.id-trigger-arrow {
  font-size: 12px;
  display: inline-block;
  transition: transform .22s ease;
}
.identity-card-trigger.open .id-trigger-arrow { transform: rotate(180deg); }

/* Collapsible panel — max-height transition */
.identity-card-panel {
  max-height: 0;
  overflow: hidden;
  opacity: 0;
  transition: max-height .35s cubic-bezier(.4,0,.2,1), opacity .25s ease;
}
.identity-card-panel.open {
  max-height: 600px;
  opacity: 1;
  margin-top: 14px;
}

/* The card face */
.id-card {
  background: linear-gradient(140deg,
    rgba(255,255,255,.07) 0%,
    rgba(255,255,255,.03) 100%
  );
  border: 1px solid rgba(255,255,255,.15);
  border-radius: 14px;
  padding: 20px 20px 16px;
  position: relative;
  overflow: hidden;
  box-shadow:
    0 4px 20px rgba(0,0,0,.35),
    inset 0 1px 0 rgba(255,255,255,.10);
}
.id-card::before {
  content: '';
  position: absolute;
  top: -50px; right: -50px;
  width: 140px; height: 140px;
  background: radial-gradient(circle, rgba(249,168,37,.10) 0%, transparent 70%);
  pointer-events: none;
}
.id-card-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 14px;
}
.id-card-academy {
  font-size: 10px;
  font-weight: 900;
  letter-spacing: .6px;
  text-transform: uppercase;
  color: var(--amber);
  opacity: .75;
}
.id-card-close {
  background: none;
  border: none;
  color: rgba(255,255,255,.25);
  font-size: 14px;
  cursor: pointer;
  font-family: inherit;
  padding: 0;
  line-height: 1;
  transition: color .15s;
  flex-shrink: 0;
}
.id-card-close:hover { color: rgba(255,255,255,.65); }
.id-card-name {
  font-size: 21px;
  font-weight: 900;
  line-height: 1.1;
  margin-bottom: 3px;
}
.id-card-level {
  font-size: 13px;
  color: rgba(255,255,255,.5);
  font-weight: 600;
  margin-bottom: 16px;
}
.id-card-fields {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
  margin-bottom: 16px;
}
.id-card-field-label {
  font-size: 9px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: .5px;
  color: rgba(255,255,255,.3);
  margin-bottom: 3px;
}
.id-card-field-val {
  font-size: 14px;
  font-weight: 700;
  color: rgba(255,255,255,.9);
}
.id-card-field-val.reserved {
  font-size: 12px;
  font-weight: 600;
  color: rgba(255,255,255,.25);
  font-style: italic;
}
.id-card-footer {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  padding-top: 14px;
  border-top: 1px solid rgba(255,255,255,.08);
}
.id-card-passport-label {
  font-size: 9px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: .5px;
  color: rgba(255,255,255,.3);
  margin-bottom: 4px;
}
.id-card-passport-no {
  font-family: 'Courier New', 'Courier', monospace;
  font-size: 14px;
  font-weight: 700;
  color: var(--amber);
  letter-spacing: .5px;
}

/* ══════════════════════════════════════════════════════════════════
   COMPONENT 6: PASSPORT PREVIEW
   Sprint-003B-2 — miniature stamp layout (not dot indicators)
   Refinement 1: stamp visual grid, not dot indicators
   Refinement 5: "Recognised Certifications" terminology only
══════════════════════════════════════════════════════════════════ */

.passport-stamp-count {
  font-size: 12px;
  font-weight: 700;
  color: rgba(255,255,255,.45);
  margin-bottom: 10px;
}

/* 6-column × 2-row miniature stamp grid — passport page feel */
.passport-mini-grid {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 5px;
  margin-bottom: 14px;
}
.passport-mini-stamp {
  aspect-ratio: 1;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
}
.passport-mini-stamp.earned {
  background: rgba(255,255,255,.07);
  border: 1.5px solid var(--level-color);
}
.passport-mini-stamp.locked {
  background: rgba(255,255,255,.03);
  border: 1.5px dashed rgba(255,255,255,.10);
}
.passport-mini-stamp.reserved {
  background: rgba(255,255,255,.02);
  border: 1px dashed rgba(255,255,255,.05);
}

/* Recognised Certifications locked row */
.passport-certs-row {
  display: flex;
  align-items: center;
  gap: 12px;
  background: rgba(255,255,255,.03);
  border: 1px solid rgba(255,255,255,.07);
  border-radius: var(--radius-sm);
  padding: 10px 14px;
  margin-bottom: 14px;
}
.passport-cert-lock  { font-size: 14px; opacity: .35; flex-shrink: 0; }
.passport-cert-title {
  font-size: 12px;
  font-weight: 700;
  color: rgba(255,255,255,.3);
  margin-bottom: 2px;
}
.passport-cert-sub {
  font-size: 11px;
  color: rgba(255,255,255,.2);
}

/* Passport CTA — disabled until Passport page is built */
.btn-passport {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  width: 100%;
  background: rgba(255,255,255,.05);
  border: 1px solid rgba(255,255,255,.10);
  color: rgba(255,255,255,.45);
  font-size: 13px;
  font-weight: 700;
  padding: 12px 18px;
  border-radius: var(--radius-sm);
  text-decoration: none;
  transition: background .15s, color .15s;
  -webkit-tap-highlight-color: transparent;
}
.btn-passport:not([aria-disabled="true"]):hover {
  background: rgba(255,255,255,.09);
  color: #fff;
}

/* ══════════════════════════════════════════════════════════════════
   COMPONENT 7: JOURNEY PREVIEW
   Sprint-003B-2 — Yesterday / Today / Next Destination
   Refinement 2: travel metaphor wording exactly as specified
══════════════════════════════════════════════════════════════════ */

.journey-stops { display: flex; flex-direction: column; }

.journey-stop {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 13px 0;
}

/* Arrow connector rendered between stops */
.journey-arrow {
  padding-left: 17px; /* centres under the 36px indicator */
  font-size: 13px;
  color: rgba(255,255,255,.18);
  line-height: 1;
  user-select: none;
  padding-top: 2px;
  padding-bottom: 2px;
}

.journey-stop-indicator {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  flex-shrink: 0;
}
.journey-stop.past    .journey-stop-indicator {
  background: rgba(255,255,255,.05);
  border: 1px solid rgba(255,255,255,.12);
  color: rgba(255,255,255,.4);
}
.journey-stop.present .journey-stop-indicator {
  background: var(--level-color);
  border: none;
  box-shadow: 0 0 16px rgba(20,100,180,.35);
  font-size: 15px;
}
.journey-stop.future  .journey-stop-indicator {
  background: rgba(249,168,37,.07);
  border: 1.5px dashed rgba(249,168,37,.3);
  color: rgba(249,168,37,.6);
}

.journey-stop-body  { flex: 1; min-width: 0; }

.journey-stop-tag {
  font-size: 9px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: .6px;
  margin-bottom: 2px;
}
.journey-stop.past    .journey-stop-tag { color: rgba(255,255,255,.25); }
.journey-stop.present .journey-stop-tag { color: var(--level-color); }
.journey-stop.future  .journey-stop-tag { color: rgba(249,168,37,.5); }

.journey-stop-level { font-weight: 700; line-height: 1.2; }
.journey-stop.past    .journey-stop-level { font-size: 14px; color: rgba(255,255,255,.4); }
.journey-stop.present .journey-stop-level { font-size: 18px; color: #fff; }
.journey-stop.future  .journey-stop-level { font-size: 14px; color: rgba(255,255,255,.7); }

.journey-stop-sub { font-size: 11px; margin-top: 1px; }
.journey-stop.past    .journey-stop-sub { color: rgba(255,255,255,.22); }
.journey-stop.present .journey-stop-sub { color: rgba(255,255,255,.45); }
.journey-stop.future  .journey-stop-sub { color: rgba(255,255,255,.32); }

/* ══════════════════════════════════════════════════════════════════
   COMPONENT 8: BUDDY PRACTICE
   Sprint-003B-2 (Refinement 4: renamed from "Quick Practice")
   Buddy attributes the recommendation; student chooses practice type.
══════════════════════════════════════════════════════════════════ */

.buddy-practice-intro {
  font-size: 12px;
  font-weight: 600;
  color: rgba(255,255,255,.42);
  margin-bottom: 10px;
}

/* Primary Buddy recommendation tile */
.buddy-practice-rec {
  display: flex;
  align-items: center;
  gap: 14px;
  background: rgba(20,100,180,.10);
  border: 1px solid rgba(20,100,180,.22);
  border-radius: var(--radius-sm);
  padding: 14px 16px;
  text-decoration: none;
  margin-bottom: 10px;
  transition: background .15s;
  -webkit-tap-highlight-color: transparent;
}
.buddy-practice-rec:hover { background: rgba(20,100,180,.17); }
.buddy-practice-rec-icon  { font-size: 22px; flex-shrink: 0; }
.buddy-practice-rec-body  { flex: 1; min-width: 0; }
.buddy-practice-rec-label {
  font-size: 15px;
  font-weight: 900;
  color: #fff;
  margin-bottom: 2px;
}
.buddy-practice-rec-sub {
  font-size: 12px;
  color: rgba(255,255,255,.5);
  line-height: 1.4;
}
.buddy-practice-rec-arrow {
  font-size: 16px;
  color: rgba(255,255,255,.35);
  flex-shrink: 0;
}

/* Secondary practice type grid */
.practice-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}
.practice-chip {
  display: flex;
  align-items: center;
  gap: 8px;
  background: rgba(255,255,255,.05);
  border: 1px solid rgba(255,255,255,.10);
  border-radius: var(--radius-sm);
  padding: 11px 13px;
  text-decoration: none;
  font-size: 13px;
  font-weight: 700;
  color: rgba(255,255,255,.7);
  transition: background .15s, color .15s;
  -webkit-tap-highlight-color: transparent;
}
.practice-chip:not(.coming):hover {
  background: rgba(255,255,255,.09);
  color: #fff;
}
.practice-chip.coming {
  opacity: .38;
  cursor: default;
  pointer-events: none;
}
.practice-chip-icon { font-size: 16px; flex-shrink: 0; }
.practice-chip-soon {
  margin-left: auto;
  font-size: 9px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .4px;
  color: rgba(255,255,255,.3);
}

/* ══════════════════════════════════════════════════════════════════
   NAVIGATION — BOTTOM BAR (mobile) + integrated in topbar (desktop)
   Design upgrade: active indicator wider (24→32px), icon scale
   slightly larger (1.1→1.15). Gold stays on active state only.
══════════════════════════════════════════════════════════════════ */
.bottom-nav {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: var(--nav-h);
  background: rgba(11,37,69,.97);
  border-top: 1px solid rgba(255,255,255,.10);
  display: flex;
  align-items: stretch;
  z-index: 200;
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
}
/* Hide bottom nav on desktop — topbar handles nav */
@media (min-width: 700px) {
  .bottom-nav { display: none; }
}
.nav-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3px;
  text-decoration: none;
  color: var(--txt-dim);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .2px;
  -webkit-tap-highlight-color: transparent;
  transition: color .15s;
  padding: 8px 4px;
  position: relative;
}
.nav-item .nav-icon { font-size: 18px; line-height: 1; transition: transform .15s; }
.nav-item .nav-lbl  { font-size: 9px; font-weight: 800; text-transform: uppercase; letter-spacing: .4px; }

.nav-item.active             { color: var(--amber); }
/* Design upgrade: scale 1.1 → 1.15 — the active icon steps forward */
.nav-item.active .nav-icon   { transform: scale(1.15); }

/* Active indicator bar */
/* Design upgrade: width 24px → 32px — more visible crown */
.nav-item.active::after {
  content: '';
  position: absolute;
  top: 0; left: 50%;
  transform: translateX(-50%);
  width: 32px;
  height: 3px;
  background: var(--amber);
  border-radius: 0 0 99px 99px;
}

/* "Coming soon" nav items — visible but softened */
.nav-item.coming {
  opacity: .38;
  cursor: default;
  pointer-events: none;
}

/* ── FOOTER ─────────────────────────────────────────────────────── */
footer {
  text-align: center;
  padding: 18px;
  font-size: 11px;
  color: rgba(255,255,255,.2);
  border-top: 1px solid rgba(255,255,255,.06);
  display: none; /* Hidden on mobile (bottom nav takes that space) */
}
@media (min-width: 700px) {
  footer { display: block; }
}
footer a { color: rgba(255,255,255,.35); text-decoration: none; }
footer a:hover { color: rgba(255,255,255,.6); }

/* ── SPRINT-003C: JOURNEY INTELLIGENCE ──────────────────────────── */

/* Journey Preview — level progress bar inside Today stop */
.journey-today-meta {
  margin-top: 6px;
}
.journey-today-pbar-wrap {
  height: 4px;
  border-radius: 2px;
  background: rgba(255,255,255,.1);
  overflow: hidden;
  margin: 4px 0 3px;
  width: 100%;
  max-width: 160px;
}
.journey-today-pbar-fill {
  height: 100%;
  border-radius: 2px;
  background: var(--level-color);
  width: 0%;
  transition: width .6s ease .2s;
}
.journey-today-pbar-label {
  font-size: 11px;
  color: rgba(255,255,255,.45);
  line-height: 1.3;
}
.journey-today-days {
  font-size: 11px;
  color: rgba(255,255,255,.3);
  margin-top: 2px;
}

/* Buddy card — avatar placeholder slot (reserved for illustrations) */
.buddy-avatar-placeholder {
  width: 0; height: 0; overflow: hidden;
  /* Will become the illustration container in a future UI Polish Sprint */
}

/* Passport — milestone anticipation line */
.passport-milestone-near {
  font-size: 12px;
  color: var(--amber);
  margin: 6px 0 10px;
  font-weight: 600;
  letter-spacing: .01em;
}

}

    radial-gradient(ellipse 75% 55% at 18% 0%, rgba(20,60,120,.17) 0%, transparent 100%),

}
body[data-atm="night"] .home-bg-layer {
  background:
    radial-gradient(ellipse 75% 55% at 18% 0%, rgba(10,30,70,.22) 0%, transparent 100%),

.welcome-greeting {
  font-size: 15px;
  font-weight: 300;
  letter-spacing: .6px;
  color: rgba(255,255,255,.50);
  margin-bottom: 5px;
}
.welcome-subtitle {
  font-size: 13px;
  color: rgba(255,255,255,.38);
  line-height: 1.70;
  margin-bottom: 10px;
  font-style: italic;
}
.welcome-name { font-size: 30px; }
.buddy-message {
  font-size: 15px;
  line-height: 1.78;
  color: rgba(255,255,255,.92);
  max-width: 560px;
}

.component {
  transition: box-shadow .2s ease, transform .2s ease, opacity .3s ease;
}
@media (hover: hover) {
  .component:hover {
    transform: translateY(-3px);
    box-shadow:
      0 8px 28px rgba(0,0,0,.44),
      inset 0 1px 0 rgba(255,255,255,.13);
  }
}

.btn-continue:active        { transform: scale(.97); }
.btn-passport:active,
.practice-chip:active,
.buddy-practice-rec:active  { transform: scale(.98); }

.pbar-fill {
  background: linear-gradient(90deg,
    var(--level-color) 0%,
    #C9A84C 38%,
    #F5E088 55%,
    #C9A84C 68%,
    var(--level-color) 100%
  ) !important;
  background-size: 200% 100% !important;
  animation: s003d-pbar-shimmer 3.2s ease-in-out 1.5s infinite !important;
}
@keyframes s003d-pbar-shimmer {
  0%,100% { background-position: 100% 0; }
  60%     { background-position: -100% 0; }
}
@media (prefers-reduced-motion: reduce) {
  .pbar-fill {
    animation: none !important;
    background: var(--level-color) !important;
  }
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}

.journey-stop.present .journey-stop-indicator {
  animation: s003d-today-pulse 2.6s ease-in-out infinite;
}
@keyframes s003d-today-pulse {
  0%,100% { box-shadow: 0 0 0  0   rgba(20,100,180,0),   0 0 16px rgba(20,100,180,.35); }
  50%     { box-shadow: 0 0 0  7px rgba(20,100,180,.14), 0 0 24px rgba(20,100,180,.52); }
}
@media (prefers-reduced-motion: reduce) {
  .journey-stop.present .journey-stop-indicator { animation: none; }

#comp-passport .passport-mini-grid {
  background: #F8F4ED;
  border-radius: var(--radius-sm);
  padding: 10px;
  gap: 6px;
}
#comp-passport .passport-mini-stamp.earned {
  background: rgba(255,255,255,.90);
  border: 1.5px solid var(--level-color);
  box-shadow: 0 2px 6px rgba(0,0,0,.14), inset 0 1px 0 rgba(255,255,255,.8);
  color: #2C1A0E;
  font-size: 14px;
}
#comp-passport .passport-mini-stamp.locked {
  background: rgba(248,244,237,.35);
  border: 1.5px dashed rgba(0,0,0,.10);
}
#comp-passport .passport-mini-stamp.reserved {
  background: rgba(248,244,237,.20);
  border: 1px dashed rgba(0,0,0,.05);
}

@keyframes s003d-stamp-earn {
  0%   { transform: scale(0) rotate(-10deg); opacity: 0; }
  55%  { transform: scale(1.14) rotate( 3deg); opacity: 1; }
  75%  { transform: scale(.97) rotate(-1deg); }
  100% { transform: scale(1)   rotate( 0deg); opacity: 1; }
}
.passport-mini-stamp.s003d-stamp-new {
  animation: s003d-stamp-earn 620ms cubic-bezier(.34,1.56,.64,1) both;
}

@keyframes s003d-passport-slot-reveal {
  from { opacity: 0; transform: translateY(-5px) scale(.92); }
  to   { opacity: 1; transform: translateY(0)    scale(1);   }
}
.passport-mini-stamp.s003d-first-reveal {
  animation: s003d-passport-slot-reveal 240ms ease both;
}
.passport-mini-stamp:nth-child(1).s003d-first-reveal  { animation-delay:   0ms; }
.passport-mini-stamp:nth-child(2).s003d-first-reveal  { animation-delay:  55ms; }
.passport-mini-stamp:nth-child(3).s003d-first-reveal  { animation-delay: 110ms; }
.passport-mini-stamp:nth-child(4).s003d-first-reveal  { animation-delay: 165ms; }
.passport-mini-stamp:nth-child(5).s003d-first-reveal  { animation-delay: 220ms; }
.passport-mini-stamp:nth-child(6).s003d-first-reveal  { animation-delay: 275ms; }
.passport-mini-stamp:nth-child(7).s003d-first-reveal  { animation-delay: 330ms; }
.passport-mini-stamp:nth-child(8).s003d-first-reveal  { animation-delay: 385ms; }
.passport-mini-stamp:nth-child(9).s003d-first-reveal  { animation-delay: 440ms; }
.passport-mini-stamp:nth-child(10).s003d-first-reveal { animation-delay: 495ms; }
.passport-mini-stamp:nth-child(11).s003d-first-reveal { animation-delay: 550ms; }

@keyframes s003d-buddy-glow {
  0%,100% {
    border-color: var(--card-bd);
    box-shadow: 0 2px 16px rgba(0,0,0,.28), inset 0 1px 0 rgba(255,255,255,.10);
  }
  50% {

#comp-buddy.s003d-celebrating {

.focus-why {

.memory-ref {

        id: 'first100XP', label: '100 XP',
        reason: 'One hundred moments of real learning — not passive, not guessed.'
      };
    }
    if (!milestones.firstStamp && ji.earnedStamps && ji.earnedStamps.length >= 1) {
      milestones.firstStamp = now;
      if (!triggered) triggered = {
        id: 'firstStamp', label: 'First Journey Stamp',
        reason: 'The Passport has started filling. This is what the journey looks like.'
      };
    }
    if (!milestones.firstWeek && ji.memberDays >= 7) {
      milestones.firstWeek = now;
      if (!triggered) triggered = {
        id: 'firstWeek', label: 'First Week',
        reason: 'The first week is when habits are formed. You formed yours.'
      };
    }
    if (!milestones.firstMonth && ji.memberDays >= 30) {
      milestones.firstMonth = now;
      if (!triggered) triggered = {
        id: 'firstMonth', label: 'One Month Together',
        reason: 'Your German today is already different from what it was a month ago.'
      };
    }
    if (!milestones.anniversary1 && ji.memberDays >= 365) {
      milestones.anniversary1 = now;
      if (!triggered) triggered = {
        id: 'anniversary1', label: 'Academy Anniversary',
        reason: 'One year. 365 days since you started your German journey here.'
      };
    }

    return { milestones: milestones, triggered: triggered };
  }

  /* ──────────────────────────────────────────────────────────────
     SPRINT-003D: JOURNEY INTELLIGENCE ENGINE
     Reads Foundation Layer data + Date() + previous home state.
     Returns a single ji object consumed by all component renderers.
     Four responsibilities: Remember · Guide · Motivate · Celebrate.
     Pure computation — no DOM access, no async, no side effects.
     Target: < 5ms.
  ────────────────────────────────────────────────────────────── */
  function buildJourneyIntelligence(prevState) {
    var now = Date.now();
    var d   = new Date(now);

    /* ── 🧠 REMEMBER ────────────────────────────────────────── */
    var lastVisitTs       = prevState ? (prevState.lastVisitTimestamp || 0) : 0;
    var daysSinceVisit    = lastVisitTs
      ? Math.floor((now - lastVisitTs) / 86400000)
      : 999; /* 999 = no prior visit recorded */
    var isFirstVisitToday = daysSinceVisit === 0;
    var returningAfterGap = daysSinceVisit >= 2;

    var profileRaw = safeGet(function () {
      var r = localStorage.getItem('tgs_profile_v1');
      return r ? JSON.parse(r) : null;
    }, null);
    var profileCreated = profileRaw ? (profileRaw.created    || 0)       : 0;
    var buddyId        = profileRaw ? (profileRaw.buddyId    || 'felix') : 'felix';
    var studentName    = profileRaw ? (profileRaw.name       || '')      : '';
    var memberDays     = profileCreated
      ? Math.floor((now - profileCreated) / 86400000)
      : 0;
    var isNewMember    = memberDays < 7;

    /* ── 🧭 GUIDE ───────────────────────────────────────────── */
    var levelId      = safeGet(function () {
      return FL.profile ? FL.profile.getCurrentLevel() : null;
    }, null) || 'A1';
    var summary      = safeGet(function () {
      return FL.progress ? FL.progress.summary() : null;
    }, null);
    var streak       = safeGet(function () {
      return FL.progress ? FL.progress.getStreak() : null;
    }, null);
    var xp           = safeGet(function () {
      return FL.progress ? FL.progress.getXP() : 0;
    }, 0);
    var levelDone    = countDone(levelId);
    var lessonsComplete = summary ? (summary.lessonsComplete || 0) : 0;
    var levelPct     = levelDone ? (levelDone.pct || 0) : 0;
    var levelProgress = levelPct < 33 ? 'early' : levelPct < 67 ? 'mid' : 'approaching';

    /* Days at current level — tracks since level was first entered */
    var prevLevel      = prevState ? (prevState.currentLevelId  || null) : null;
    var levelStartDate = prevState ? (prevState.levelStartDate  || 0)    : 0;
    if (!levelStartDate || (prevLevel && prevLevel !== levelId)) {
      levelStartDate = now; /* level just changed or no prior record */
    }
    var daysAtLevel = Math.max(0, Math.floor((now - levelStartDate) / 86400000));

    /* ── ❤️ MOTIVATE ─────────────────────────────────────────── */
    var hour     = d.getHours();
    var timeSlot = hour >= 5  && hour < 12 ? 'morning'
                 : hour >= 12 && hour < 18 ? 'afternoon'
                 : hour >= 18 && hour < 22 ? 'evening'
                 : 'night';
    var dow      = d.getDay();  /* 0=Sun … 6=Sat */
    var dayType  = dow === 1              ? 'monday'
                 : dow === 5              ? 'friday'
                 : (dow === 0 || dow === 6) ? 'weekend'
                 : 'weekday';

    var streakCurrent = streak ? (streak.current || 0) : 0;
    var nextSM        = nextStreakMilestone(streakCurrent);
    var streakMomentum = streakCurrent === 0              ? 'broken'
                       : (nextSM && nextSM.away === 1)    ? 'milestone_near'
                       : streakCurrent >= 30              ? 'champion'
                       : 'building';

    /* ── 🏆 CELEBRATE ────────────────────────────────────────── */
    var earned              = safeGet(function () {
      return FL.achievements ? FL.achievements.getEarned() : [];
    }, []);
    var nextSMTarget        = nextSM ? nextSM.target : null;
    var daysToNextMilestone = nextSM ? nextSM.away   : null;
    /* milestoneHitToday: streak landed exactly on a milestone AND this is the first visit today */
    var milestoneHitToday   = streakCurrent > 0
      && STREAK_MILESTONES.indexOf(streakCurrent) >= 0
      && isFirstVisitToday;

    return {
      /* 🧠 REMEMBER */
      daysSinceVisit:      daysSinceVisit,
      isFirstVisitToday:   isFirstVisitToday,
      returningAfterGap:   returningAfterGap,
      memberDays:          memberDays,
      isNewMember:         isNewMember,
      buddyId:             buddyId,
      studentName:         studentName,
      profileCreated:      profileCreated,
      /* 🧭 GUIDE */
      levelId:             levelId,
      levelProgress:       levelProgress,
      levelPct:            levelPct,
      lessonsComplete:     lessonsComplete,
      xp:                  xp,
      daysAtLevel:         daysAtLevel,
      levelStartDate:      levelStartDate,
      levelDone:           levelDone,
      /* ❤️ MOTIVATE */
      timeSlot:            timeSlot,
      dayType:             dayType,
      streak:              streak,
      streakCurrent:       streakCurrent,
      streakMomentum:      streakMomentum,
      /* 🏆 CELEBRATE */
      earnedStamps:        earned,
      nextStreakMilestone:  nextSMTarget,
      daysToNextMilestone: daysToNextMilestone,
      milestoneHitToday:   milestoneHitToday,
      /* Derived — convenience refs for renderers */
      summary:             summary
    };
  }

  /*
   * selectJIMessage(pool, ji, extras)
   * Walks the priority ladder for a given pool, selects the matching
   * key, returns the buddy-voiced string with dynamic substitutions.
   * extras = { n, level, icon } — optional replacement tokens.
   */
  function selectJIMessage(pool, ji, extras) {
    var buddyId = ji ? (ji.buddyId || 'felix') : 'felix';
    var key;

    if (pool === MESSAGES.greeting) {
      if (ji.memberDays === 0)                                        key = 'firstVisit';
      else if (ji.daysSinceVisit >= 7)                               key = 'gapLong';
      else if (ji.returningAfterGap)                                  key = 'gapShort';
      else if (ji.milestoneHitToday)                                  key = 'milestoneHit';
      else if (ji.streakMomentum === 'milestone_near')               key = 'milestoneNear';
      else if (ji.streakMomentum === 'champion')                     key = 'champion';
      else if (ji.dayType === 'monday')                               key = 'monday';
      else if (ji.dayType === 'friday')                               key = 'friday';
      else if (ji.dayType === 'weekend')                              key = 'weekend';
      else                                                            key = 'default';
    } else if (pool === MESSAGES.buddy) {
      if (ji.daysSinceVisit >= 7)                                    key = 'gapLong';
      else if (ji.returningAfterGap)                                  key = 'gapShort';
      else if (ji.streakMomentum === 'milestone_near')               key = 'milestoneNear';
      else if (ji.streakMomentum === 'champion')                     key = 'champion';
      else if (ji.levelProgress === 'approaching')                   key = 'approaching';
      else if (ji.isNewMember)                                        key = 'newMember';
      else if (ji.dayType === 'monday')                               key = 'monday';
      else if (ji.dayType === 'weekend')                              key = 'weekend';
      else if (ji.streakCurrent === 0 && ji.lessonsComplete > 0)    key = 'brokenStreak';
      else if (ji.lessonsComplete === 0)                              key = 'firstLesson';
      else                                                            key = 'default';
    } else {
      return '';
    }

    var entry = pool[key];
    if (!entry) return '';
    var msg = entry[buddyId] || entry['felix'] || '';
    if (extras) {
      if (extras.n    !== undefined) msg = msg.replace(/\{n\}/g,     String(extras.n));
      if (extras.level !== undefined) msg = msg.replace(/\{level\}/g, String(extras.level));
      if (extras.icon !== undefined) msg = msg.replace(/\{icon\}/g,  String(extras.icon));
    }
    return msg;
  }

  /* ──────────────────────────────────────────────────────────────
     FOUNDATION LAYER SAFETY GUARDS
     Graceful degradation if any module failed to load.
  ────────────────────────────────────────────────────────────── */
  function safeGet(fn, fallback) {
    try { return fn(); } catch (e) { return fallback; }
  }
  var FL = {
    progress:     typeof TGS_PROGRESS     !== 'undefined' ? TGS_PROGRESS     : null,
    profile:      typeof TGS_PROFILE      !== 'undefined' ? TGS_PROFILE      : null,
    content:      typeof TGS_CONTENT      !== 'undefined' ? TGS_CONTENT      : null,
    achievements: typeof TGS_ACHIEVEMENTS !== 'undefined' ? TGS_ACHIEVEMENTS : null,
    levels:       typeof TGS_LEVELS       !== 'undefined' ? TGS_LEVELS       : null
  };

  /* ──────────────────────────────────────────────────────────────
     HOME STATE (tgs_home_v1)
     Written on each page load — provides Last Visit Memory for
     Sprint-003B-3. Reading it now also seeds the infrastructure.
  ────────────────────────────────────────────────────────────── */
  function readHomeState() {
    try {
      var raw = localStorage.getItem(HOME_STORAGE_KEY);
      return raw ? JSON.parse(raw) : null;
    } catch (e) { return null; }
  }

  function writeHomeState(data) {
    try {
      localStorage.setItem(HOME_STORAGE_KEY, JSON.stringify(data));
    } catch (e) {}
  }

  function buildHomeState(ji, nextLessonId, lastStamp, milestones, passportFirstOpen) {
    var summary = ji ? ji.summary : null;
    var ms = milestones || {};
    /* Preserve passportFirstOpen timestamp if set */
    if (passportFirstOpen && !ms.passportFirstOpen) ms.passportFirstOpen = passportFirstOpen;
    return {
      version:                 HOME_VERSION,
      lastVisitDate:           new Date().toISOString().slice(0, 10),
      lastVisitTimestamp:      Date.now(),
      currentLevelId:          ji ? ji.levelId : null,
      lessonsCompleteAtVisit:  summary ? (summary.lessonsComplete || 0) : 0,
      xpAtVisit:               summary ? (summary.xp || 0) : 0,
      lastActiveLessonId:      nextLessonId || null,
      lastStampEarned:         lastStamp    || null,
      /* Sprint-003C — Journey Intelligence state */
      levelStartDate:          ji ? ji.levelStartDate : null,
      /*
       * Sprint-003D — Personal Milestones (additive; never overwrites prior timestamps)
       * passportFirstOpen: timestamp of first passport section view (Signature Moment gate)
       */
      milestones:              ms,
      /*
       * lastLevelComplete: set when progress:levelComplete fires.
       * lastDiscoveryId: set when Discover Germany Today is active (future).
       */
      lastLevelComplete:       null,
      lastDiscoveryId:         null
    };
  }

  /* ──────────────────────────────────────────────────────────────
     GERMAN GREETING HELPER
     Converts ji.timeSlot → German time-of-day greeting.
     Called by renderWelcome(ji) — timeSlot already computed in JIE.
  ────────────────────────────────────────────────────────────── */
  function getGermanGreeting(timeSlot) {
    if (timeSlot === 'morning')   return 'Guten Morgen';
    if (timeSlot === 'afternoon') return 'Guten Tag';
    if (timeSlot === 'evening')   return 'Guten Abend';
    return 'Willkommen zurück';
  }

  /* ──────────────────────────────────────────────────────────────
     MILESTONE UTILITIES
  ────────────────────────────────────────────────────────────── */
  function nextLessonMilestone(done) {
    for (var i = 0; i < LESSON_MILESTONES.length; i++) {
      if (done < LESSON_MILESTONES[i]) {
        return { target: LESSON_MILESTONES[i], away: LESSON_MILESTONES[i] - done };
      }
    }
    return null;
  }

  function nextStreakMilestone(current) {
    for (var i = 0; i < STREAK_MILESTONES.length; i++) {
      if (current < STREAK_MILESTONES[i]) {
        return { target: STREAK_MILESTONES[i], away: STREAK_MILESTONES[i] - current };
      }
    }
    return null;
  }

  /* ──────────────────────────────────────────────────────────────
     TODAY'S FOCUS — JIE-DRIVEN (Sprint-003C)
     Replaces Sprint-003B-1 selectBuddyMessage + selectTodaysFocus.
     Buddy messages now come from selectJIMessage(MESSAGES.buddy, ji).
     Focus prefix comes from MESSAGES.focus keyed by ji context;
     renderFocus(focus, ji) applies it around the existing lesson text.
     This function computes the FOCUS OBJECT (icon + text) from ji.
  ────────────────────────────────────────────────────────────── */
  function selectTodaysFocus(ji) {
    var current  = ji ? ji.streakCurrent : 0;
    var done     = ji ? ji.lessonsComplete : 0;
    var nextLM   = nextLessonMilestone(done);

    /* Very first lesson */
    if (done === 0) {
      return {
        icon: '✨',
        text: 'Complete your first lesson. Your German journey begins today.',
        why:  'Because every German speaker in the world started with a single lesson — and so do you.'
      };
    }

    /* Near lesson milestone (≤2 away) */
    if (nextLM && nextLM.away <= 2) {
      return {
        icon: '🏆',
        text: 'Earn your ' + nextLM.target + '-lesson milestone — just ' +
              nextLM.away + ' lesson' + (nextLM.away === 1 ? '' : 's') + ' away.',
        why:  'Because lesson milestones mark real chapters in your learning story.'
      };
    }

    /* Approaching level completion */
    if (ji && ji.levelProgress === 'approaching') {
      return {
        icon: '🎯',
        text: 'You\'re close to finishing ' + (ji.levelId || '') + '. Push through to the next level.',
        why:  'Because completing a full level builds a depth of knowledge that individual lessons alone cannot.'
      };
    }

    /* Returning after gap — ease back in */
    if (ji && ji.returningAfterGap) {
      return {
        icon: '▶️',
        text: 'Welcome back — pick up with a lesson you know well.',
        why:  'Because returning after a break calls for something familiar — rebuilding momentum gently is the right way in.'
      };
    }

    /* Streak at 0 */
    if (current === 0) {
      return {
        icon: '🎯',
        text: 'Start a new streak today. One lesson is enough to begin.',
        why:  'Because consistency over time is what separates learners from speakers.'
      };
    }

    /* Streak day 1 */
    if (current === 1) {
      return {
        icon: '🎯',
        text: 'Build on today\'s start. A second session makes a streak.',
        why:  'Because the second day is always harder than the first — and that is exactly why it matters most.'
      };
    }

    /* Default: maintain streak */
    return {
      icon: '🔥',
      text: 'Maintain your ' + current + '-day streak. One lesson keeps it alive.',
      why:  'Because each day you show up, German becomes a little more natural and a little more yours.'
    };
  }

  /* ──────────────────────────────────────────────────────────────
     CONTINUE JOURNEY — FIND NEXT LESSON
  ────────────────────────────────────────────────────────────── */
  function findNextLesson(levelId) {
    if (!FL.content || !levelId) return null;
    try {
      var prog = FL.content.getLevelProgress(levelId);
      if (prog && prog.nextLesson) return prog.nextLesson; /* { lesson, moduleKey, module } */
    } catch (e) {}
    return null;
  }

  function countDone(levelId) {
    if (!FL.content || !levelId) return { done: 0, total: 0 };
    try {
      var lp = FL.content.getLevelProgress(levelId);
      return { done: lp.done || 0, total: lp.total || 0, pct: lp.pct || 0 };
    } catch (e) { return { done: 0, total: 0, pct: 0 }; }
  }

  /* ──────────────────────────────────────────────────────────────
     LEVEL COLOUR
  ────────────────────────────────────────────────────────────── */
  function applyLevelColor(levelId) {
    if (!FL.levels || !levelId) return;
    try {
      var ld = FL.levels.get(levelId);
      if (ld && ld.color) {
        document.documentElement.style.setProperty('--level-color', ld.color);
      }
    } catch (e) {}
  }

  /* ──────────────────────────────────────────────────────────────
     COMPONENT RENDERERS
  ────────────────────────────────────────────────────────────── */

  /* 1. Welcome Header — Sprint-003D: memory ref + milestone banner */
  function renderWelcome(ji, milestoneBanner) {
    var el = document.getElementById('comp-welcome');
    if (!el) return;

    var levelId     = ji ? ji.levelId    : 'A1';
    var xp          = ji ? ji.xp         : 0;
    var streakCount = ji ? ji.streakCurrent : 0;
    var streakIcon  = streakCount >= 3 ? '🔥' : '📅';

    /* German time-of-day greeting */
    var greeting  = getGermanGreeting(ji ? ji.timeSlot : 'default');

    /* JI-selected motivational subtitle */
    var subtitle  = selectJIMessage(
      MESSAGES.greeting, ji,
      { n: streakCount, level: LEVEL_LABELS[levelId] || levelId }
    );

    /* Sprint-003D: Memory reference (shown once per session max) */
    var memRef = buildMemoryReference(ji);

    /* Student name — personalised if available */
    var displayName = (ji && ji.studentName) ? ji.studentName : 'Welcome back';

    /* Sprint-003D: Personal milestone banner (rendered above stats if triggered) */
    var milestoneHtml = '';
    if (milestoneBanner) {
      milestoneHtml =
        '<div class="personal-milestone-banner" role="status" aria-live="polite">' +
          '<div class="milestone-banner-label">✦ Personal Milestone</div>' +
          '<div class="milestone-banner-text">' + escHtml(milestoneBanner.label) + '</div>' +
          (milestoneBanner.reason
            ? '<div class="milestone-banner-reason">' + escHtml(milestoneBanner.reason) + '</div>'
            : '') +
        '</div>';
    }

    el.innerHTML =
      '<p class="welcome-greeting" id="living-greeting">' + escHtml(greeting) + '</p>' +

      (subtitle
        ? '<p class="welcome-subtitle" id="welcome-subtitle">' + escHtml(subtitle) + '</p>'
        : '') +

      /* Sprint-003D: Memory reference — quiet, warm, beneath subtitle */
      (memRef
        ? '<p class="memory-ref" id="memory-ref">' + escHtml(memRef) + '</p>'
        : '') +

      '<div class="welcome-name-row">' +
        '<span class="welcome-name" id="welcome-name-text">' + escHtml(displayName) + '</span>' +
        '<span class="welcome-level-chip" id="welcome-level-chip">' + escHtml(levelId || '—') + '</span>' +
      '</div>' +

      /* Sprint-003D: milestone banner just above stats */
      milestoneHtml +

      '<div class="welcome-stats">' +
        '<div class="stat-chip">' +
          '<span class="stat-icon">' + streakIcon + '</span>' +
          '<span class="stat-val">' + streakCount + '</span>' +
          '<span class="stat-lbl">' + (streakCount === 1 ? 'day' : 'days') + '</span>' +
        '</div>' +
        '<div class="stat-chip">' +
          '<span class="stat-icon">⭐</span>' +
          '<span class="stat-val">' + (xp || 0) + '</span>' +
          '<span class="stat-lbl">XP</span>' +
        '</div>' +
      '</div>' +

      /* Identity Card trigger + collapsible panel — Sprint-003B-2 */
      '<button class="identity-card-trigger" id="identity-card-trigger" ' +
              'type="button" aria-expanded="false" aria-controls="identity-card-panel">' +
        '<span class="id-trigger-arrow" aria-hidden="true">▾</span> Your Academy Card' +
      '</button>' +
      '<div class="identity-card-panel" id="identity-card-panel" ' +
           'role="region" aria-label="Academy Identity Card" aria-hidden="true"></div>';

    el.classList.remove('is-loading');
  }

  /* 2. German Buddy Card — Sprint-003D: SVG companion + expression mapping */
  function renderBuddy(ji) {
    var el = document.getElementById('comp-buddy');
    if (!el) return;

    var buddyId   = ji ? (ji.buddyId || 'felix') : 'felix';
    var buddyName = buddyId === 'sophia'
      ? 'Sophia — Your German Buddy'
      : 'Felix — Your German Buddy';
    var message   = selectJIMessage(
      MESSAGES.buddy, ji,
      { n: ji ? ji.streakCurrent : 0, level: LEVEL_LABELS[ji ? ji.levelId : 'A1'] || (ji ? ji.levelId : 'A1') }
    );

    /* Sprint-003D: expression mapping from JI context */
    var expression = 'default';
    if (ji) {
      if (ji.milestoneHitToday || ji.streakMomentum === 'champion') {
        expression = 'celebrating';
      } else if (ji.daysSinceVisit >= 7 || ji.streakCurrent === 0) {
        expression = 'motivating';
      } else if (ji.levelProgress === 'approaching') {
        expression = 'recommending';
      }
    }

    /* Celebration glow on card border */
    if (expression === 'celebrating') {
      el.classList.add('s003d-celebrating');
    } else {
      el.classList.remove('s003d-celebrating');
    }

    /* SVG companion illustration */
    var companionFn = (buddyId === 'sophia') ? COMPANION_SVG.sophia : COMPANION_SVG.felix;
    var svgHtml     = companionFn(expression);

    el.innerHTML =
      '<div class="buddy-card">' +
        /* Sprint-003D: SVG companion replaces emoji placeholder */
        '<div class="companion-wrap' + (expression === 'celebrating' ? ' s003d-celebrating' : '') + '" ' +
             'role="img" aria-label="' + escHtml(buddyName) + '">' +
          svgHtml +
        '</div>' +
        '<div class="buddy-body">' +
          '<div class="buddy-name">✦ ' + escHtml(buddyName) + '</div>' +
          '<p class="buddy-message">' + escHtml(message) + '</p>' +
          '<span class="buddy-ask-link" title="Ask Buddy — coming in future sprint">' +
            'Ask Buddy → <span style="font-size:10px;opacity:.5">(coming soon)</span>' +
          '</span>' +
        '</div>' +
      '</div>';

    el.classList.remove('is-loading');
  }

  /* 3. Today's Focus — Sprint-003C: JI context prefix */
  function renderFocus(focus, ji) {
    var el = document.getElementById('comp-focus');
    if (!el) return;

    /* Select context-appropriate prefix from MESSAGES.focus */
    var prefixKey = 'default';
    if (ji) {
      if (ji.returningAfterGap)               prefixKey = 'returning';
      else if (ji.levelProgress === 'approaching') prefixKey = 'approaching';
      else if (ji.timeSlot === 'morning')      prefixKey = 'morning';
      else if (ji.timeSlot === 'evening')      prefixKey = 'evening';
      else if (ji.dayType   === 'monday')      prefixKey = 'monday';
    }
    var prefix     = MESSAGES.focus[prefixKey] || null; /* null = no prefix */
    var focusText  = prefix
      ? prefix + ' ' + focus.text
      : focus.text;

    el.innerHTML =
      '<div class="focus-card">' +
        '<span class="focus-icon" aria-hidden="true">' + focus.icon + '</span>' +
        '<div class="focus-body">' +
          '<div class="focus-label">Today\'s Focus</div>' +
          '<div class="focus-text">' + escHtml(focusText) + '</div>' +
          /* Sprint-003D: Why-First rationale */
          (focus.why
            ? '<div class="focus-why">' + escHtml(focus.why) + '</div>'
            : '') +
        '</div>' +
      '</div>';

    el.classList.remove('is-loading');
  }

  /* 4. Continue Journey (Primary CTA) */
  function renderCTA(nextLesson, levelId, levelDone) {
    var el = document.getElementById('comp-cta');
    if (!el) return;

    var html = '';

    if (!nextLesson) {
      /* First-time student — no level assigned yet */
      if (!levelId) {
        html =
          '<p class="cta-module-label" style="margin-bottom:12px">Begin your German journey</p>' +
          '<p class="cta-lesson-title">Where would you like to start?</p>' +
          '<div class="cta-meta-row">' +
            '<span class="cta-meta-item">📍 Find your level</span>' +
          '</div>' +
          '<a class="btn-continue btn-begin" href="placement-test.html">' +
            '✨ Begin Placement Test' +
          '</a>';
      } else {
        /* Level set but all lessons complete */
        var nextLevel = safeGet(function() {
          var ld = FL.levels.get(levelId);
          return ld && ld.nextLevel ? ld.nextLevel : null;
        }, null);

        html =
          '<p class="cta-complete-note">🎉 You\'ve completed all available lessons in ' + escHtml(levelId) + '!</p>' +
          (nextLevel
            ? '<p class="cta-lesson-title">Ready for ' + escHtml(LEVEL_LABELS[nextLevel] || nextLevel) + '</p>' +
              '<a class="btn-continue" href="level-dashboard.html?level=' + escHtml(nextLevel) + '">' +
                '▶ Begin ' + escHtml(nextLevel) + ' →' +
              '</a>'
            : '<p class="cta-lesson-title">Outstanding achievement — you\'ve reached the top!</p>');
      }
    } else {
      /* Normal continue state */
      var lesson    = nextLesson.lesson;
      var moduleKey = nextLesson.moduleKey;
      var module    = nextLesson.module;

      var moduleLabel = module ? (module.icon ? (module.icon + ' ' + module.label) : module.label)
                                : (moduleKey.charAt(0).toUpperCase() + moduleKey.slice(1));
      var doneInfo    = '';
      if (levelDone && levelDone.total > 0) {
        doneInfo = levelDone.done + ' of ' + levelDone.total + ' lessons complete';
      }

      var lessonContent = FL.content ? FL.content.getLesson(lesson.id) : null;
      var estMins       = lessonContent ? lessonContent.estimatedMinutes : null;

      html =
        '<div class="cta-module-row">' +
          '<span class="cta-module-badge">' + escHtml(levelId || '') + '</span>' +
          '<span class="cta-module-label">' + escHtml(moduleLabel) + '</span>' +
        '</div>' +
        '<h2 class="cta-lesson-title">' + escHtml(lesson.title) + '</h2>' +
        '<div class="cta-meta-row">' +
          (estMins ? '<span class="cta-meta-item">⏱ ~' + estMins + ' min</span>' : '') +
          (doneInfo ? '<span class="cta-meta-item">📖 ' + escHtml(doneInfo) + '</span>' : '') +
        '</div>' +
        '<a class="btn-continue" href="' + escHtml(lesson.file) + '">' +
          '▶ Continue' +
        '</a>';
    }

    el.innerHTML = html;
    el.classList.remove('is-loading');
  }

  /*
   * PASSPORT NUMBER — Sprint-003B-2 PLACEHOLDER
   * Derived client-side from profile creation timestamp.
   *
   * RESERVED ARCHITECTURE: When server infrastructure is established,
   * Academy Passport Numbers should be permanent sequential integers
   * issued at student registration, stored server-side, and retrieved
   * via authenticated account. Display format TGS-YYYY-NNNNN reserved.
   */
  function buildPassportNumber(ts) {
    if (!ts) return 'TGS-XXXX-XXXXX';
    var d   = new Date(ts);
    var yr  = d.getFullYear();
    var seq = String(ts % 100000).padStart(5, '0');
    return 'TGS-' + yr + '-' + seq;
  }

  function formatMemberSince(ts) {
    if (!ts) return '—';
    var months = ['January','February','March','April','May','June',
                  'July','August','September','October','November','December'];
    var d = new Date(ts);
    return months[d.getMonth()] + ' ' + d.getFullYear();
  }

  function formatNum(n) {
    if (!n) return '0';
    return String(n).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
  }

    function openCard() {
      panel.classList.add('open');
      trigger.classList.add('open');

    function closeCard() {
      panel.classList.remove('open');
      trigger.classList.remove('open');
      trigger.setAttribute('aria-expanded', 'false');

    function toggleCard() {
      panel.classList.contains('open') ? closeCard() : openCard();

    trigger.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); toggleCard(); }

    var nextId = idx < LEVEL_ORDER.length - 1 ? LEVEL_ORDER[idx + 1] : null;

    function stopHtml(type, id, labelOverride, subOverride, iconOverride) {
      var icon  = iconOverride  || (type === 'past' ? '✓' : type === 'present' ? '📍' : '→');
      var label = labelOverride || LEVEL_LABELS[id] || (id || '—');

            '<div class="journey-stop-sub">' + escHtml(sub) + '</div>' +
          '</div>' +
        '</div>'

    }

    var prevStop = prevId
      ? stopHtml('past', prevId)
      : stopHtml('past', null, 'Before the Academy', 'Where your journey begins', '✦');

    var currStop = stopHtml('present', levelId);

    var nextStop = nextId
      ? stopHtml('future', nextId)
      : stopHtml('future', null, 'The Summit', 'You have arrived — mastery achieved!', '⭐');

  /* ──────────────────────────────────────────────────────────────
     LIVE EVENT WIRING
     Updates components in real time when student returns from a lesson
     while the Home tab is still open.
  ────────────────────────────────────────────────────────────── */
  function wireLiveEvents(levelId) {
    if (!TGS || !TGS.utils || !TGS.utils.events) return;

    /* Progress updated — refresh progress bar and stats */
    TGS.utils.events.on('progress:lessonComplete', function () {
      var s  = safeGet(function() { return FL.progress.summary(); }, null);
      var ld = countDone(levelId);
      if (s) renderProgress(levelId, s, ld);
      /* Refresh CTA to point to new next lesson */
      var nl = findNextLesson(levelId);
      renderCTA(nl, levelId, ld);
    });

    /* Stamp earned — refresh Passport Preview grid live with current _ji */
    TGS.utils.events.on('achievement:stampEarned', function (data) {
      var latestEarned = safeGet(function() {
        return FL.achievements ? FL.achievements.getEarned() : [];
      }, []);
      renderPassportPreview(latestEarned, _ji);
      if (typeof console !== 'undefined') {
        console.info('[TGS Home] Stamp earned:', data.stampId, '— Passport refreshed');
      }
    });

    /* Level complete — set in home state for celebration window */
    TGS.utils.events.on('progress:levelComplete', function (data) {
      try {
        var hs = readHomeState() || {};
        hs.lastLevelComplete = Date.now();
        writeHomeState(hs);
      } catch (e) {}
    });
  }

  /* ──────────────────────────────────────────────────────────────
     ESCAPE UTILITY (XSS prevention)
  ────────────────────────────────────────────────────────────── */
  function escHtml(str) {
    if (str == null) return '';
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  /* ──────────────────────────────────────────────────────────────
     BOOTSTRAP — MAIN INIT
  ────────────────────────────────────────────────────────────── */
  function init() {

    /* ── 1. Read prior home state (for JIE last-visit memory) ── */
    var prevState = readHomeState();

    /* ── 2. Build Journey Intelligence (pure computation, < 5ms) ─ */
    var ji = buildJourneyIntelligence(prevState);

    /* Store on module scope so wireLiveEvents handlers can use it */
    _ji = ji;

    /* ── 3. Apply level colour ─────────────────────────────────── */
    applyLevelColor(ji.levelId);

    /* ── 3b. Sprint-003D: Apply atmosphere tint (Constitution Article VI: Respect Time) */
    /* Time-of-day atmosphere — one read, no live shifts mid-session */
    document.body.setAttribute('data-atm', ji.timeSlot);

    /* ── 4. Today's Focus (JIE-driven, Sprint-003D: includes why) ─ */
    var focus = selectTodaysFocus(ji);

    /* ── 5. Next lesson ──────────────────────────────────────────── */
    var nextLesson = findNextLesson(ji.levelId);
    var levelDone  = ji.levelDone || countDone(ji.levelId);

    /* ── 6. Read profile creation timestamp for Identity Card ────── */
    var profileCreated = ji.profileCreated || null;

    /* ── 6b. Sprint-003D: Detect personal milestones ─────────────── */
    var milestoneResult  = detectPersonalMilestones(ji, prevState);
    var updatedMilestones = milestoneResult.milestones;
    var triggeredMilestone = milestoneResult.triggered;

    /* ── 6c. Sprint-003D: Passport first-open Signature Moment ────── */
    var isPassportFirstOpen = !(prevState && prevState.milestones &&
                                prevState.milestones.passportFirstOpen);
    /* Record first-open immediately so it only fires once */
    if (isPassportFirstOpen) {
      updatedMilestones.passportFirstOpen = Date.now();
    }

    /* ── 7. Render Sprint-003B-1 components (Sprint-003D: +milestoneBanner) */
    renderWelcome(ji, triggeredMilestone);
    renderIdentityCard(ji.xp, profileCreated, ji.levelId);
    renderBuddy(ji);
    renderFocus(focus, ji);
    renderCTA(nextLesson, ji.levelId, levelDone);
    renderProgress(ji.levelId, ji.summary, levelDone);

    /* ── 8. Render Sprint-003B-2 components (Sprint-003D: +isFirstOpen) */
    renderPassportPreview(ji.earnedStamps, ji, isPassportFirstOpen);
    renderJourneyPreview(ji);
    renderBuddyPractice(ji);

    /* ── 9. Update navigation deep links ────────────────────────── */
    updateNavLinks(ji.levelId);

    /* ── 10. Wire live events ────────────────────────────────────── */
    wireLiveEvents(ji.levelId);

    /* ── 11. Persist home state (Sprint-003D: milestones included) ── */
    var lastStamp    = ji.earnedStamps && ji.earnedStamps.length > 0
      ? ji.earnedStamps[ji.earnedStamps.length - 1].id
      : null;
    var nextLessonId = nextLesson && nextLesson.lesson ? nextLesson.lesson.id : null;
    writeHomeState(buildHomeState(ji, nextLessonId, lastStamp, updatedMilestones));

    /*
     * YOUR GERMAN JOURNEY — RESERVED ARCHITECTURE NOTE
     * When "Your German Journey" is implemented (future sprint), it will:
     * - Read: TGS_PROGRESS.export(), TGS_ACHIEVEMENTS.export()
     * - Calculate: year of data (Jan 1 – Dec 31)
     * - Display: lessons completed, XP earned, study time, longest streak,
     *            stamps earned, favourite learning category, biggest achievement
     * - Trigger: annually (dec 31 / jan 1) or on demand
     * - Share: screenshot-friendly card with Academy branding
     * No implementation here. Infrastructure (Foundation Layer data) is complete.
     */
  }

  /* Run after DOM is ready */
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    /* readyState is 'interactive' or 'complete' */
    setTimeout(init, 0);
  }

}());
</script>

</body>
</html>
