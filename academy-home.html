/* ââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââ
   COMPONENT 5: PROGRESS SUMMARY â ACHIEVEMENT WALL
   Design upgrade: numbers 20px â 30px (proud, scoreboard scale).
   Progress bar 6px â 9px with subtle shimmer animation.
   Motion-safe: shimmer gated behind prefers-reduced-motion check.
ââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââ */
.progress-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 1px;
  background: rgba(255,255,255,.07);
  border-radius: var(--radius-sm);
  overflow: hidden;
  margin-bottom: 18px;
}
/* Design upgrade: more vertical padding so large numbers breathe */
.prog-stat {
  background: var(--navy2);
  padding: 16px 10px;
  text-align: center;
}
/* Design upgrade: 20px â 30px â numbers should feel proud */
.prog-stat-val {
  font-size: 30px;
  font-weight: 900;
  line-height: 1;
  margin-bottom: 5px;
}
.prog-stat-lbl {
  font-size: 10px;
  font-weight: 700;
  color: rgba(255,255,255,.38);
  text-transform: uppercase;
  letter-spacing: .5px;
}

/* Level progress bar */
.level-prog-label {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 7px;
}
.level-prog-name {
  font-size: 13px;
  font-weight: 700;
  color: rgba(255,255,255,.8);
}
.level-prog-pct {
  font-size: 12px;
  font-weight: 700;
  color: var(--level-color);
}
/* Design upgrade: 6px â 9px â a more substantial track */
.pbar-wrap {
  background: rgba(255,255,255,.10);
  border-radius: 99px;
  height: 9px;
  overflow: hidden;
}
/*
 * Design upgrade: bar carries a moving highlight (shimmer) using
 * background-position animation â no transform, no layout impact.
 * Gated behind prefers-reduced-motion for accessibility.
 */
.pbar-fill {
  height: 100%;
  background: linear-gradient(90deg,
    var(--level-color)           0%,
    rgba(255,255,255,.30)        50%,
    var(--level-color)           100%
  );
  background-size: 200% 100%;
  border-radius: 99px;
  transition: width .7s ease;
  min-width: 2px;
  animation: bar-shimmer 2.8s ease-in-out 1.2s infinite;
}
@keyframes bar-shimmer {
  0%   { background-position:  100% 0; }
  60%  { background-position: -100% 0; }
  100% { background-position: -100% 0; }
}
/* Accessibility: disable animation for users who prefer reduced motion */
@media (prefers-reduced-motion: reduce) {
  .pbar-fill {
    animation: none;
    background: var(--level-color);
  }
}
.level-prog-sub {
  margin-top: 7px;
  font-size: 11px;
  color: var(--txt-faint);
}

/* ââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââ
   SKELETON LOADING STATES
   Sections get .is-loading until JS renders them.
   Since data is from localStorage, duration is <50ms typically.
ââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââ */
.is-loading {
  pointer-events: none;
}
.is-loading .skel {
  background: rgba(255,255,255,.06);
  border-radius: 6px;
  animation: skel-pulse 1.2s ease-in-out infinite;
}
.skel-h1  { height: 28px; width: 60%; margin-bottom: 12px; }
.skel-h2  { height: 18px; width: 80%; margin-bottom: 8px; }
.skel-h3  { height: 14px; width: 90%; margin-bottom: 6px; }
.skel-btn { height: 52px; width: 100%; margin-top: 14px; }
@keyframes skel-pulse {
  0%,100% { opacity: .5; }
  50%      { opacity: 1; }
}

/* Fade-in animation for rendered content */
.fade-in {
  animation: fadeUp .3s ease both;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* Stagger delays for sequential reveal */
.stagger-1 { animation-delay: 0ms;   }
.stagger-2 { animation-delay: 50ms;  }
.stagger-3 { animation-delay: 100ms; }
.stagger-4 { animation-delay: 150ms; }
.stagger-5 { animation-delay: 200ms; }
/* Sprint-003B-2 additions */
.stagger-6 { animation-delay: 250ms; }
.stagger-7 { animation-delay: 300ms; }
.stagger-8 { animation-delay: 350ms; }
