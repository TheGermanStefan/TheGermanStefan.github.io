const LEVEL_BADGE = {
  A1:["#375623","#c6efce"],A2:["#1F4E79","#ddebf7"],B1:["#843C0C","#fce4d6"],
  B2:["#7F6000","#fff2cc"],C1:["#1e4d2b","#e2efda"],C2:["#4A235A","#d9d2e9"]
};

let currentLevel = 'all';
let sortCol = 0, sortDir = 1;

// Populate theme filter
const themes = [...new Set(DATA.map(r=>r[6]))].sort();
const sel = document.getElementById('filter-thema');
themes.forEach(t=>{ const o=document.createElement('option'); o.value=t; o.textContent=t; sel.appendChild(o); });

function filterLevel(level, el) {
  currentLevel = level;
  document.querySelectorAll('.stat-chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  applyFilters();
}

function applyFilters() {
  const q = document.getElementById('search').value.toLowerCase();
  const wortart = document.getElementById('filter-wortart').value;
  const thema = document.getElementById('filter-thema').value;
  let rows = DATA.filter(r => {
    if(currentLevel !== 'all' && r[0] !== currentLevel) return false;
    if(wortart && r[5] !== wortart) return false;
    if(thema && r[6] !== thema) return false;
    if(q) {
      return r[1].toLowerCase().includes(q) ||
             r[4].toLowerCase().includes(q) ||
             r[6].toLowerCase().includes(q) ||
             r[7].toLowerCase().includes(q);
    }
    return true;
  });
  // sort
  rows.sort((a,b) => {
    let av = a[sortCol]||'', bv = b[sortCol]||'';
    return av.localeCompare(bv, 'de') * sortDir;
  });
  renderRows(rows);
  document.getElementById('count-info').textContent = rows.length + ' Wörter angezeigt';
}

function renderRows(rows) {
  const tbody = document.getElementById('tbody');
  if(!rows.length) {
    tbody.innerHTML='';
    document.getElementById('no-results').style.display='block';
    return;
  }
  document.getElementById('no-results').style.display='none';
  tbody.innerHTML = rows.map(r => {
    const [lv,bg] = LEVEL_BADGE[r[0]];
    return `<tr style="background:${LEVEL_BG[r[0]]}">
      <td class="level-badge"><span class="badge" style="background:${lv};color:${bg}">${r[0]}</span></td>
      <td class="german">${esc(r[1])}</td>
      <td style="color:#8aa8c4">${esc(r[2])}</td>
      <td style="color:#aac4de;font-size:.78rem">${esc(r[3])}</td>
      <td>${esc(r[4])}</td>
      <td style="color:#C9A84C;font-size:.78rem">${esc(r[5])}</td>
      <td style="color:#8aa8c4;font-size:.78rem">${esc(r[6])}</td>
      <td class="example">${esc(r[7])}</td>
    </tr>`;
  }).join('');
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function sortBy(col) {
  const ths = document.querySelectorAll('thead th');
  ths.forEach(th=>th.className='');
  if(sortCol===col) sortDir*=-1; else { sortCol=col; sortDir=1; }
  ths[col].className = sortDir===1?'sorted-asc':'sorted-desc';
  applyFilters();
}

// Initial render
applyFilters();
document.getElementById('count-info').textContent = DATA.length + ' Wörter angezeigt';
