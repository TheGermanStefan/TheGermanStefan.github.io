<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>TheGermanStefan · B2 Hub</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#0b2545;--lc:#c62828;--amber:#f9a825;--gray:#f0f4f8;--txt:#1a1a1a;--txt2:#555;--green:#2e7d32;--red:#c62828}
body{font-family:'Segoe UI',Arial,sans-serif;background:var(--gray);color:var(--txt);font-size:15px;line-height:1.7;min-height:100vh}
.topbar{background:var(--navy);color:#fff;display:flex;align-items:center;justify-content:space-between;padding:0 18px;height:52px;position:sticky;top:0;z-index:200;gap:12px}
.tb-left{display:flex;align-items:center;gap:8px;overflow:hidden}
.tb-logo{font-weight:900;font-size:15px;color:#fff;white-space:nowrap}
.tb-sep{color:rgba(255,255,255,.4);font-size:13px}
.tb-crumb{font-size:12px;color:rgba(255,255,255,.6);white-space:nowrap;text-decoration:none}
.tb-crumb:hover{color:#fff}
.tb-badge{background:var(--lc);color:#fff;font-size:11px;font-weight:900;padding:3px 10px;border-radius:12px;margin-left:4px}
.tb-right{display:flex;gap:4px;flex-shrink:0}
.lb{background:transparent;border:1px solid rgba(255,255,255,.25);color:rgba(255,255,255,.7);font-size:11px;font-weight:700;padding:3px 8px;border-radius:6px;cursor:pointer;font-family:inherit;transition:.15s}
.lb:hover{background:rgba(255,255,255,.15);color:#fff}
.lb.on{background:var(--amber);border-color:var(--amber);color:var(--navy)}
.pgstrip{height:4px;background:rgba(0,0,0,.1);position:sticky;top:52px;z-index:199}
.pgfill{height:100%;background:var(--amber);width:0%;transition:width .6s}
.hero{background:linear-gradient(135deg,#0b2545 0%,#7f0000 60%,#c62828 100%);color:#fff;padding:36px 24px 30px;text-align:center;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none'%3E%3Cg fill='%23ffffff' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E")}
.hero-badge{background:var(--amber);color:var(--navy);font-weight:900;font-size:12px;padding:4px 14px;border-radius:20px;display:inline-block;margin-bottom:12px;letter-spacing:.5px;position:relative}
.hero h1{font-size:28px;font-weight:900;margin-bottom:6px;position:relative}
.hero .sub{font-size:15px;opacity:.85;margin-bottom:18px;position:relative}
.hero-stats{display:flex;justify-content:center;gap:24px;position:relative;margin-bottom:18px}
.hero-stat-n{font-size:22px;font-weight:900;color:var(--amber)}
.hero-stat-l{font-size:11px;opacity:.75}
.pb-wrap{max-width:460px;margin:0 auto;position:relative}
.pb-label{font-size:12px;opacity:.7;margin-bottom:5px;display:flex;justify-content:space-between}
.pb{height:7px;background:rgba(255,255,255,.2);border-radius:10px;overflow:hidden}
.pb-fill{height:100%;background:var(--amber);border-radius:10px;transition:width .6s;width:0%}
.wrap{max-width:980px;margin:0 auto;padding:28px 16px 80px}
.level-nav{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:24px}
.lnav-btn{padding:8px 18px;border-radius:10px;border:2px solid #ddd;background:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;text-decoration:none;display:inline-block;transition:.15s;color:var(--txt)}
.lnav-btn:hover{border-color:var(--lc);color:var(--lc)}
.lnav-btn.active{background:var(--lc);border-color:var(--lc);color:#fff}
.section-hdr{display:flex;align-items:center;gap:10px;margin-bottom:14px;margin-top:8px}
.section-icon{font-size:22px}
.section-title{font-size:18px;font-weight:900;color:var(--navy)}
.section-count{font-size:12px;color:var(--txt2);background:#e8e8e8;padding:3px 10px;border-radius:12px;font-weight:700}
.section-bar{height:6px;background:#e0e0e0;border-radius:10px;margin-bottom:18px;overflow:hidden}
.section-bar-fill{height:100%;background:var(--lc);border-radius:10px;transition:width .6s;width:0%}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-bottom:32px}
.card{background:#fff;border:2px solid #e0e6f0;border-radius:12px;padding:16px 18px;cursor:pointer;transition:.2s;position:relative;overflow:hidden}
.card:hover{border-color:var(--lc);box-shadow:0 4px 18px rgba(198,40,40,.15);transform:translateY(-2px)}
.card.done{border-color:var(--green);background:linear-gradient(135deg,#f1f8f1,#fff)}
.card.done::after{content:'✓';position:absolute;top:10px;right:12px;font-size:16px;font-weight:900;color:var(--green)}
.card-num{font-size:11px;font-weight:800;color:var(--lc);text-transform:uppercase;margin-bottom:4px}
.card.done .card-num{color:var(--green)}
.card-title{font-size:14px;font-weight:800;color:var(--navy);margin-bottom:3px;line-height:1.3}
.card-sub{font-size:12px;color:var(--txt2)}
.card-arrow{position:absolute;bottom:12px;right:14px;font-size:14px;color:#ccc;transition:.2s}
.card:hover .card-arrow{color:var(--lc);transform:translateX(3px)}
</style>
</head>
<body>
<div class="topbar">
  <div class="tb-left">
    <span class="tb-logo">&#127465;&#127466; TGS</span>
    <span class="tb-sep">&rsaquo;</span>
    <a class="tb-crumb" href="TheGermanStefan_Platform_Blueprint.html">Home</a>
    <span class="tb-sep">&rsaquo;</span>
    <span class="tb-crumb">B2</span>
    <span class="tb-badge">B2</span>
  </div>
  <div class="tb-right">
    <button class="lb on" data-lang="en" onclick="setLang('en')">EN</button>
    <button class="lb" data-lang="fr" onclick="setLang('fr')">FR</button>
    <button class="lb" data-lang="es" onclick="setLang('es')">ES</button>
    <button class="lb" data-lang="it" onclick="setLang('it')">IT</button>
    <button class="lb" data-lang="pt" onclick="setLang('pt')">PT</button>
  </div>
</div>
<div class="pgstrip"><div class="pgfill" id="pgf"></div></div>

<div class="hero">
  <div class="hero-badge">B2 · Upper Intermediate</div>
  <h1>B2 Learning Hub</h1>
  <p class="sub" data-t="hero_sub">Grammar · Reading · Vocabulary · Speaking</p>
  <div class="hero-stats">
    <div class="hero-stat"><div class="hero-stat-n">10</div><div class="hero-stat-l" data-t="stat_grammar">Grammar</div></div>
    <div class="hero-stat"><div class="hero-stat-n">5</div><div class="hero-stat-l" data-t="stat_reading">Reading</div></div>
    <div class="hero-stat"><div class="hero-stat-n">5</div><div class="hero-stat-l" data-t="stat_vocab">Vocab</div></div>
    <div class="hero-stat"><div class="hero-stat-n">10</div><div class="hero-stat-l" data-t="stat_speaking">Speaking</div></div>
  </div>
  <div class="pb-wrap">
    <div class="pb-label"><span id="pb-text">0 of 30 completed</span><span id="pb-pct">0%</span></div>
    <div class="pb"><div class="pb-fill" id="pb-fill"></div></div>
  </div>
</div>

<div class="wrap">
  <div class="level-nav">
    <a class="lnav-btn" href="TheGermanStefan_A0_Beginner_Hub.html">A0</a>
    <a class="lnav-btn" href="TheGermanStefan_A1_Hub.html">A1</a>
    <a class="lnav-btn" href="TheGermanStefan_A2_Hub.html">A2</a>
    <a class="lnav-btn" href="TheGermanStefan_B1_Hub.html">B1</a>
    <a class="lnav-btn active">B2</a>
  </div>

  <div class="section-hdr"><span class="section-icon">📐</span><span class="section-title" data-t="sec_grammar">Grammar</span><span class="section-count">10 lessons</span></div>
  <div class="section-bar"><div class="section-bar-fill" id="bar_g"></div></div>
  <div class="grid" id="grid_g"></div>

  <div class="section-hdr"><span class="section-icon">📖</span><span class="section-title" data-t="sec_reading">Reading Room</span><span class="section-count">5 texts</span></div>
  <div class="section-bar"><div class="section-bar-fill" id="bar_r"></div></div>
  <div class="grid" id="grid_r"></div>

  <div class="section-hdr"><span class="section-icon">🔤</span><span class="section-title" data-t="sec_vocab">Vocabulary</span><span class="section-count">5 sets</span></div>
  <div class="section-bar"><div class="section-bar-fill" id="bar_v"></div></div>
  <div class="grid" id="grid_v"></div>

  <div class="section-hdr"><span class="section-icon">🎤</span><span class="section-title" data-t="sec_speaking">Speaking Cards</span><span class="section-count">10 cards</span></div>
  <div class="section-bar"><div class="section-bar-fill" id="bar_s"></div></div>
  <div class="grid" id="grid_s"></div>
</div>

<script>
const LANG={en:{hero_sub:'Grammar · Reading · Vocabulary · Speaking',stat_grammar:'Grammar',stat_reading:'Reading',stat_vocab:'Vocab',stat_speaking:'Speaking',completed_label:'completed',sec_grammar:'Grammar',sec_reading:'Reading Room',sec_vocab:'Vocabulary',sec_speaking:'Speaking Cards'},fr:{hero_sub:'Grammaire · Lecture · Vocabulaire · Expression',stat_grammar:'Grammaire',stat_reading:'Lecture',stat_vocab:'Vocab',stat_speaking:'Expression',completed_label:'terminés',sec_grammar:'Grammaire',sec_reading:'Salle de lecture',sec_vocab:'Vocabulaire',sec_speaking:'Cartes de parole'},es:{hero_sub:'Gramática · Lectura · Vocabulario · Conversación',stat_grammar:'Gramática',stat_reading:'Lectura',stat_vocab:'Vocab',stat_speaking:'Conversación',completed_label:'completados',sec_grammar:'Gramática',sec_reading:'Sala de lectura',sec_vocab:'Vocabulario',sec_speaking:'Tarjetas de habla'},it:{hero_sub:'Grammatica · Lettura · Vocabolario · Parlato',stat_grammar:'Grammatica',stat_reading:'Lettura',stat_vocab:'Vocab',stat_speaking:'Parlato',completed_label:'completati',sec_grammar:'Grammatica',sec_reading:'Sala di lettura',sec_vocab:'Vocabolario',sec_speaking:'Schede di conversazione'},pt:{hero_sub:'Gramática · Leitura · Vocabulário · Conversação',stat_grammar:'Gramática',stat_reading:'Leitura',stat_vocab:'Vocab',stat_speaking:'Conversação',completed_label:'concluídos',sec_grammar:'Gramática',sec_reading:'Sala de leitura',sec_vocab:'Vocabulário',sec_speaking:'Cartões de fala'}};
let CL=localStorage.getItem('tgs_lang')||'en';
function t(k){return(LANG[CL]||LANG.en)[k]||k}
function applyLang(){document.querySelectorAll('[data-t]').forEach(el=>el.innerHTML=t(el.getAttribute('data-t')));document.querySelectorAll('.lb').forEach(b=>b.classList.toggle('on',b.getAttribute('data-lang')===CL))}
function setLang(c){CL=c;localStorage.setItem('tgs_lang',c);applyLang()}

const GRAMMAR=[
  {n:'01',title:'Zustandspassiv',sub:'Das Fenster ist geöffnet vs. wird geöffnet',file:'B2_Grammar_01_Zustandspassiv.html'},
  {n:'02',title:'Konjunktiv I vertieft',sub:'Indirekte Rede in Texten & Medien',file:'B2_Grammar_02_Konjunktiv1.html'},
  {n:'03',title:'Partizipialkonstruktionen',sub:'Erweiterte Partizipialsätze',file:'B2_Grammar_03_Partizipialkonstruktionen.html'},
  {n:'04',title:'Konzessive Konnektoren',sub:'obwohl · trotzdem · dennoch · wenngleich',file:'B2_Grammar_04_Konzessiv.html'},
  {n:'05',title:'Kausale & konsekutive Sätze',sub:'da · weil · sodass · so … dass',file:'B2_Grammar_05_Kausal_Konsekutiv.html'},
  {n:'06',title:'Nominalisierung',sub:'das Lesen · die Verwendung · Substantivierung',file:'B2_Grammar_06_Nominalisierung.html'},
  {n:'07',title:'Modalpartikeln',sub:'doch · ja · mal · eigentlich · wohl · halt',file:'B2_Grammar_07_Modalpartikeln.html'},
  {n:'08',title:'Irrealis der Vergangenheit',sub:'Hätte ich … wäre ich … geworden',file:'B2_Grammar_08_Irrealis.html'},
  {n:'09',title:'Genitivpräpositionen',sub:'bezüglich · hinsichtlich · angesichts · infolge',file:'B2_Grammar_09_Genitivpraepositionen.html'},
  {n:'10',title:'Textgrammatik',sub:'Kohärenz · Referenz · Textverknüpfung',file:'B2_Grammar_10_Textgrammatik.html'},
];
const READING=[
  {n:'01',title:'Gesellschaftlicher Wandel',sub:'Social change in modern Germany',file:'B2_Reading_01_Gesellschaft.html'},
  {n:'02',title:'Wissenschaft & Forschung',sub:'Science, research and innovation',file:'B2_Reading_02_Wissenschaft.html'},
  {n:'03',title:'Globalisierung',sub:'Globalisation: opportunities and risks',file:'B2_Reading_03_Globalisierung.html'},
  {n:'04',title:'Kultur & Identität',sub:'Cultural identity in a diverse world',file:'B2_Reading_04_Kultur.html'},
  {n:'05',title:'Wirtschaft & Finanzen',sub:'Economy, finance and social inequality',file:'B2_Reading_05_Wirtschaft.html'},
];
const VOCAB=[
  {n:'01',title:'Wissenschaft & Forschung',sub:'Research, innovation and academia',file:'B2_Vocab_01_Wissenschaft.html'},
  {n:'02',title:'Wirtschaft & Finanzen',sub:'Economy, business and finance',file:'B2_Vocab_02_Wirtschaft.html'},
  {n:'03',title:'Gesellschaft & Soziales',sub:'Society, social issues and welfare',file:'B2_Vocab_03_Gesellschaft.html'},
  {n:'04',title:'Kultur & Kunst',sub:'Culture, arts and creative expression',file:'B2_Vocab_04_Kultur.html'},
  {n:'05',title:'Politik & Recht',sub:'Politics, law and governance',file:'B2_Vocab_05_Politik.html'},
];
const SPEAKING=[
  {n:'01',title:'Argumentation',sub:'Building and defending an argument',file:'B2_Sprechen_01_Argumentation.html'},
  {n:'02',title:'Debatte',sub:'Pro & Kontra — structured discussion',file:'B2_Sprechen_02_Debatte.html'},
  {n:'03',title:'Präsentation',sub:'Presenting information clearly',file:'B2_Sprechen_03_Praesentation.html'},
  {n:'04',title:'Verhandlung',sub:'Negotiating interests and compromise',file:'B2_Sprechen_04_Verhandlung.html'},
  {n:'05',title:'Beschwerde',sub:'Making a formal complaint',file:'B2_Sprechen_05_Beschwerde.html'},
  {n:'06',title:'Meinung äußern',sub:'Expressing nuanced opinions',file:'B2_Sprechen_06_Meinung.html'},
  {n:'07',title:'Vorstellungsgespräch',sub:'Job interview — professional self-presentation',file:'B2_Sprechen_07_Interview.html'},
  {n:'08',title:'Mediation',sub:'Mediating between different positions',file:'B2_Sprechen_08_Mediation.html'},
  {n:'09',title:'Kulturvergleich',sub:'Describing cultural differences',file:'B2_Sprechen_09_Kulturvergleich.html'},
  {n:'10',title:'Stegreifrede',sub:'Impromptu speech on any topic',file:'B2_Sprechen_10_Stegreifrede.html'},
];

const DONE_KEY='tgs_b2_done';
let done=JSON.parse(localStorage.getItem(DONE_KEY)||'{}');
function markDone(key){done[key]=true;localStorage.setItem(DONE_KEY,JSON.stringify(done));updateProgress()}
function updateProgress(){
  const total=30,n=Object.keys(done).length;
  document.getElementById('pb-fill').style.width=(n/total*100)+'%';
  document.getElementById('pb-text').textContent=n+' of '+total+' '+t('completed_label');
  document.getElementById('pb-pct').textContent=Math.round(n/total*100)+'%';
  document.getElementById('pgf').style.width=(n/total*100)+'%';
  ['g','r','v','s'].forEach(sec=>{
    const keys=Object.keys(done).filter(k=>k.startsWith(sec+'_'));
    const max={g:10,r:5,v:5,s:10}[sec];
    const bar=document.getElementById('bar_'+sec);
    if(bar)bar.style.width=(keys.length/max*100)+'%';
  });
}
function buildGrid(id,items,prefix){
  const el=document.getElementById(id);
  el.innerHTML=items.map(item=>{
    const key=prefix+'_'+item.n,isDone=done[key]?'done':'';
    return `<div class="card ${isDone}" onclick="markDone('${key}');window.location='${item.file}'">
      <div class="card-num">${prefix.toUpperCase()} ${item.n}</div>
      <div class="card-title">${item.title}</div>
      <div class="card-sub">${item.sub}</div>
      <div class="card-arrow">&#8594;</div>
    </div>`;
  }).join('');
}
buildGrid('grid_g',GRAMMAR,'g');
buildGrid('grid_r',READING,'r');
buildGrid('grid_v',VOCAB,'v');
buildGrid('grid_s',SPEAKING,'s');
updateProgress();
applyLang();
</script>
<script src="level-nav.js"></script>
</body>
</html>
